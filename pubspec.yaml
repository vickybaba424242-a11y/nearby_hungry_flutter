name: nearby_hungry_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.3+52

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  carousel_slider: ^5.1.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.1.2
  firebase_storage: ^12.4.10

  geoflutterfire_plus: ^0.0.18
  geolocator: ^10.1.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.6
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  dropdown_button2: ^2.3.9
  geocoding: ^3.0.0
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0

  # Google Sign-In
  google_sign_in: ^6.3.0

  sign_in_with_apple: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/categories/
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: assets/logo/app_logo.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/logo/splash_logo.png

  android_12:
    image: assets/logo/splash_logo.png
    color: "#FFFFFF"

  android: true
  ios: true
  web: false