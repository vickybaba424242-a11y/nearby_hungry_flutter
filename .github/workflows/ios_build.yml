name: Nearby Hungry Flutter iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # Install Flutter 3.13.5 stable (includes Dart >= 3.10.7)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.13.5

      # Verify versions
      - name: Flutter & Dart Version
        run: |
          flutter --version
          dart --version

      # Get dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      # Build IPA
      - name: Build iOS IPA
        env:
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        run: flutter build ipa --export-method app-store --no-codesign

      # Upload IPA artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NearbyHungry.ipa
          path: build/ios/ipa/*.ipa