name: Nearby Hungry Flutter iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Install correct Flutter version manually
      - name: Install Flutter 3.13.5
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.13.5 --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      # 3. Verify Flutter & Dart version
      - name: Flutter & Dart Version
        run: |
          flutter --version
          dart --version

      # 4. Install dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      - name: Upgrade Flutter
        run: flutter upgrade --force

      - name: Build iOS IPA
        env:
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        run: |
          flutter build ipa --export-method app-store --no-codesign