name: Nearby Hungry Flutter iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Remove old Flutter completely to avoid conflicts
      - name: Remove old Flutter
        run: |
          sudo rm -rf /usr/local/flutter
          echo "/usr/local/bin" >> $GITHUB_PATH

      # 3. Install Flutter 3.13.5 manually
      - name: Install Flutter 3.13.5
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.13.5 --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
          flutter doctor

      # 4. Verify Dart version
      - name: Check Dart Version
        run: dart --version

      # 5. Get Flutter dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      # 6. Build iOS IPA
      - name: Build iOS IPA
        env:
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        run: flutter build ipa --export-method app-store --no-codesign