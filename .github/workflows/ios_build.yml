name: Nearby Hungry Flutter iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Install Flutter 3.13.5 manually and run Flutter commands using full path
      - name: Install Flutter & Get Dependencies
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.13.5 --depth 1 flutter
          ./flutter/bin/flutter --version
          ./flutter/bin/dart --version
          ./flutter/bin/flutter pub get

      # 3. Build iOS IPA using the same Flutter binary
      - name: Build iOS IPA
        env:
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        run: ./flutter/bin/flutter build ipa --export-method app-store --no-codesign