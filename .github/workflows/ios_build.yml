name: Nearby Hungry iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Show Flutter & Dart Versions
        run: |
          flutter --version
          dart --version

      - name: Upgrade Flutter
        run: flutter upgrade --force

      - name: Build iOS IPA
        env:
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        run: |
          flutter build ipa --export-method app-store --no-codesign