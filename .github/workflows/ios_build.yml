name: Nearby Hungry Flutter iOS CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Flutter (correct version for Dart 3.10.7+)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'

      # 3. Install dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      # 4. Show Flutter and Dart version
      - name: Show Flutter & Dart Versions
        run: |
          flutter --version
          dart --version

      # 5. Build IPA for App Store
      - name: Build iOS IPA
        env:
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        run: |
          flutter build ipa --export-method app-store --no-codesign