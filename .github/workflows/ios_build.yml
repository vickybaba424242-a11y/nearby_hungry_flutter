name: Flutter iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          channel: stable

      - name: Check Flutter Version
        run: |
          flutter --version
          dart --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Decode Apple Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE }}
        run: |
          printf "%s" "$CERTIFICATE_BASE64" | tr -d '\n' | base64 --decode > certificate.p12
          ls -lh certificate.p12

      - name: Verify Certificate Password
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          openssl pkcs12 -info -in certificate.p12 -noout -password pass:$CERTIFICATE_PASSWORD

      - name: Install Apple Certificate
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k temp build.keychain

      - name: Install Provisioning Profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf "%s" "$PROFILE_BASE64" | tr -d '\n' | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build iOS IPA
        run: flutter build ipa --release --export-method app-store

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: nearby-hungry-ipa
          path: build/ios/ipa/*.ipa