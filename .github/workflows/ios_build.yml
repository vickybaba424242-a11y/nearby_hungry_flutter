name: Nearby Hungry Flutter iOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Download Flutter SDK 3.13.5 stable manually
      - name: Install Flutter manually
        run: |
          curl -L https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_3.13.5-stable.zip -o flutter.zip
          unzip flutter.zip
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      # 2. Verify Flutter & Dart versions
      - name: Flutter & Dart Version
        run: |
          flutter --version
          dart --version

      # 3. Get dependencies using the **correct Dart version**
      - name: Flutter Pub Get
        run: flutter pub get

      # 4. Build IPA
      - name: Build iOS IPA
        env:
          APP_STORE_KEY: ${{ secrets.APP_STORE_KEY }}
          APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
          APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        run: flutter build ipa --export-method app-store --no-codesign